name: Fuzz

# Daily fuzz run for the cargo-fuzz harnesses under fuzz/. The shared
# workflow auto-discovers the targets from fuzz/fuzz_targets/*.rs and
# splits the 30-minute total budget evenly across them. Current
# targets: parse_annexb (Annex B walk + VPS/SPS/PPS + slice-header
# parse) and decode_residual (§7.3.8.11 residual_coding() through the
# §9.3 CABAC engine).

on:
  schedule:
    - cron: "19 6 * * *"   # daily 06:19 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      time_budget_seconds: 1800
    secrets: inherit
